<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Photo Trio</title>
  <style>
    :root {
      --bg-start: #cfcfcf;
      --bg-end: #8e8e8e;
      --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, var(--bg-start), var(--bg-end));
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .gallery {
      width: min(1100px, 94vw);
      display: grid;
      grid-template-columns: 1fr 1.25fr 1fr;
      gap: clamp(1rem, 4vw, 2.25rem);
      align-items: center;
    }

    .photo-wrap {
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      transform-origin: center;
      animation: bob 6s ease-in-out infinite;
      transition: transform 280ms ease, box-shadow 280ms ease;
      will-change: transform;
    }

    .photo-wrap:hover {
      transform: translateY(-8px) scale(1.08);
      box-shadow: 0 26px 48px rgba(0, 0, 0, 0.34);
      z-index: 2;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .side {
      aspect-ratio: 3 / 4;
      max-height: min(60vh, 520px);
    }

    .center {
      aspect-ratio: 4 / 5;
      max-height: min(72vh, 650px);
      animation-delay: -1.3s;
    }

    .left {
      animation-delay: -0.6s;
    }

    .right {
      animation-delay: -2.2s;
    }

    @keyframes bob {
      0%,
      100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @media (max-width: 860px) {
      .gallery {
        grid-template-columns: 1fr;
        width: min(540px, 92vw);
      }

      .side,
      .center {
        max-height: none;
        aspect-ratio: 4 / 5;
      }
    }
  </style>
</head>
<body>
  <main class="gallery" aria-label="Floating image gallery">
    <figure class="photo-wrap side left">
      <img src="IMG_3339.jpg" alt="Left floating photo" />
    </figure>

    <figure class="photo-wrap center">
      <img src="IMG_9367.jpg" alt="Center floating photo" />
    </figure>

    <figure class="photo-wrap side right">
      <img src="HEIF Image.HEIC" alt="Right floating photo" />
    </figure>
  </main>
</body>
</html>
